  // ------------------------------------------------------------------
  "creative-writing": {

    totalDuration: "8 Weeks",
    level: "All Levels",

    welcomeMessage: "Welcome to Professional Creative Writing & Narrative Craft. This programme is designed for writers who want to elevate their craft—whether you are a novelist, screenwriter, poet, or content creator. You will explore narrative structure, character development, voice, and style, while receiving constructive feedback on your work. The course blends literary tradition with contemporary digital storytelling, preparing you to write with purpose, precision, and emotional resonance. Let us begin your journey toward becoming a more powerful storyteller.",
    modules: [
      {

        moduleTitle: "The Architecture of Story",
        duration: "4 Hours",
        sections: [
          {
            sectionNumber: 1,
            sectionTitle: "Three-Act and Five-Act Structures",
            content: "Story structure is the framework that holds your narrative together. The three-act structure—setup, confrontation, and resolution—is one of the most widely used models in film and literature. It provides a clear arc: introduce characters and their world, present a conflict that forces them to act, and show the consequences. The five-act structure, often associated with Shakespearean drama, offers more granularity, with exposition, rising action, climax, falling action, and denouement. In this section, we will compare these structures and discuss when to use each. You will learn to map your story onto these frameworks, ensuring that your narrative has momentum and emotional payoff."
          },
          {
            sectionNumber: 2,
            sectionTitle: "Plot vs. Character-Driven Narratives",
            content: "Some stories are driven by external events—the plot—while others focus on internal transformation—the character arc. Plot-driven narratives, like thrillers and adventure stories, emphasise action, twists, and high stakes. Character-driven narratives, often found in literary fiction, explore the protagonist's psyche, relationships, and personal growth. The most memorable stories often balance both: external events force internal change, and internal change influences external actions. In this section, we will examine examples of each type and discuss how to find the right balance for your own work. Understanding this dynamic will help you craft stories that resonate deeply with readers."
          },
          {
            sectionNumber: 3,
            sectionTitle: "Inciting Incidents and Turning Points",
            content: "The inciting incident is the event that sets the main story in motion—it disrupts the status quo and forces the protagonist to act. Turning points are moments of change that shift the direction of the plot or deepen the character's journey. Both are essential for maintaining tension and pacing. In this section, we will explore how to craft effective inciting incidents that hook readers, and how to design turning points that raise stakes and reveal character. We will analyse examples from classic and contemporary literature, learning how great writers use these elements to keep readers engaged from the first page to the last."
          }
        ]
      },
      {

        moduleTitle: "Character Craft",
        duration: "3 Hours",
        sections: [

            content: "Characters are the heart of any story. A protagonist must be relatable, flawed, and capable of change. An antagonist is not merely a villain; they are a force that opposes the protagonist's goals, and they should have their own motivations and complexity. In this section, we will learn techniques for building characters from the ground up—starting with their desires, fears, and values. We will discuss how to create characters that feel real, with strengths and weaknesses that make them human. You will also explore how to give your antagonist depth so that they are not one-dimensional but a worthy adversary."

          {
            sectionNumber: 2,
            sectionTitle: "Character Arcs and Motivation",
            content: "A character arc is the transformation a character undergoes during the story. There are several types: the positive arc (change for the better), the negative arc (change for the worse), and the flat arc (the character changes their world rather than themselves). The key to a compelling arc is motivation—what does the character want, and why do they want it? In this section, we will study examples of each type and discuss how to design arcs that are both satisfying and believable. You will learn to align your character's internal journey with the external plot, creating a cohesive and impactful narrative."
          },
          {
            sectionNumber: 3,
            sectionTitle: "Dialogue and Inner Monologue",
            content: "Dialogue reveals character, advances the plot, and creates rhythm and authenticity. Great dialogue sounds natural but is more polished and purposeful than real speech. It should show subtext—what characters are really thinking or feeling beneath the words they say. Inner monologue gives readers direct access to a character's thoughts, revealing their fears, hopes, and secrets. In this section, we will practise writing dialogue that is crisp, distinctive, and layered with meaning. We will also explore how to balance dialogue with narration and use inner monologue to deepen emotional connection with the reader."

            content: "Your narrative voice is the personality of your writing—it's what makes your work distinctive. It encompasses word choice, sentence rhythm, and the perspective from which the story is told. Some voices are lyrical and poetic; others are direct and economical. Finding your voice is a journey of discovery, influenced by your life experiences, favourite authors, and the stories you want to tell. In this section, we will experiment with different voices, write passages from multiple perspectives, and develop your ability to modulate your voice to suit different genres and audiences. Your voice is your signature as a writer; it's worth cultivating."

        ]

            sectionNumber: 2,

  // ------------------------------------------------------------------
  // COURSE 6: Introduction to Robotics & Automation Systems
  // ------------------------------------------------------------------
  "robotics-automation": {
    courseTitle: "Introduction to Robotics & Automation Systems",
    totalDuration: "10 Weeks",
    level: "Intermediate",
    instructor: "ForraNova Academy Faculty",
    welcomeMessage: "Welcome to Introduction to Robotics & Automation Systems. This programme introduces the core concepts of robotics and industrial automation—from kinematics and control systems to sensors, actuators, and programming. You will learn to design, simulate, and prototype automated systems using both theoretical frameworks and practical tools. The course is ideal for engineers, technicians, and innovators looking to enter the fast-growing field of robotics and intelligent automation. Let us begin.",
    modules: [
      {
        moduleNumber: 1,
        moduleTitle: "Foundations of Robotics",
        duration: "4 Hours",
        sections: [
          {
            sectionNumber: 1,
            sectionTitle: "What Is a Robot?",
            content: "A robot is a programmable machine that can sense, think, and act in the physical world. The definition has evolved over time; today, robots range from industrial arms in factories to autonomous vacuum cleaners in homes and even self-driving cars. In this section, we will discuss the core components of a robot—sensors, actuators, control systems, and the power supply—and explore the history of robotics from ancient myths to modern automation. Understanding what makes a machine a robot is the first step toward designing one."
          },
          {
            sectionNumber: 2,
            sectionTitle: "Degrees of Freedom and Workspace",
            content: "A robot's mobility is described by its degrees of freedom, which are the number of independent ways it can move. For a robotic arm, degrees of freedom typically include rotation and translation in multiple axes. The workspace is the volume of space that the robot's end-effector can reach. In this section, we will learn how to calculate degrees of freedom using the Denavit-Hartenberg convention and how to analyse a robot's workspace. This understanding is crucial for designing robots that can perform their intended tasks efficiently."
          },
          {
            sectionNumber: 3,
            sectionTitle: "Historical Development and Future Trends",
            content: "Robotics has come a long way from the first industrial arm in the nineteen sixties to today's collaborative robots, drones, and humanoids. In this section, we will trace the key milestones—the Unimate, the Stanford arm, the development of force control, and the rise of AI-driven robotics. We will also discuss future trends: swarm robotics, soft robotics, and the integration of machine learning. Robotics is a field in constant evolution, and understanding its trajectory helps you anticipate where the opportunities will be."
          }
        ]
      },
      {
        moduleNumber: 2,
        moduleTitle: "Kinematics and Dynamics",
        duration: "4 Hours",
        sections: [
          {
            sectionNumber: 1,
            sectionTitle: "Forward and Inverse Kinematics",
            content: "Forward kinematics calculates the position of a robot's end-effector given its joint angles. Inverse kinematics does the reverse—it finds the joint angles needed to place the end-effector at a desired position and orientation. In this section, we will derive the equations for both using geometric and algebraic methods. We will work through examples for a simple planar arm and a six-degree-of-freedom industrial robot. Mastering kinematics is essential for programming robots to perform precise movements."
          },
          {
            sectionNumber: 2,
            sectionTitle: "Velocity and Acceleration Analysis",
            content: "Robots must not only move to the right place but also move smoothly and safely. Velocity analysis involves calculating the Jacobian matrix, which relates joint velocities to end-effector velocities. Acceleration analysis extends this to account for changes in velocity. In this section, we will learn how to compute velocities and accelerations in both joint space and Cartesian space. This analysis is critical for trajectory planning, ensuring that the robot moves with the desired speed and smoothness."
          },
          {
            sectionNumber: 3,
            sectionTitle: "Trajectory Planning",
            content: "Trajectory planning is the process of generating a time sequence of positions, velocities, and accelerations that guide the robot from a start to a goal. In this section, we will discuss different approaches: joint-space trajectories (polynomial, trapezoidal) and Cartesian-space trajectories (linear, circular, and spline). We will also cover the concept of 'via points'—intermediate points that the robot must pass through. Smooth and efficient trajectory planning is what separates a clumsy robot from a graceful one."
          }
        ]
      },
      {
        moduleNumber: 3,
        moduleTitle: "Sensors and Actuators",
        duration: "3 Hours",
        sections: [
          {
            sectionNumber: 1,
            sectionTitle: "Position, Velocity, and Force Sensors",
            content: "Sensors are the eyes and ears of a robot. In this section, we will explore common sensors: potentiometers and encoders for position measurement, tachometers for velocity, and force/torque sensors for interaction with the environment. We will also discuss LIDAR, cameras, and ultrasonic sensors for perception. Each sensor has its own strengths and limitations; choosing the right sensor for your application is key. You will learn to read sensor data and interpret it to make decisions."
          },
          {
            sectionNumber: 2,
            sectionTitle: "Motors, Servos, and Steppers",
            content: "Actuators are the muscles of a robot. In this section, we will cover the main types: DC motors, servo motors, and stepper motors. We will learn the principles of operation—how they convert electrical energy into mechanical motion—and how to control them using pulse-width modulation or step-and-direction signals. We will also discuss geared motors and the trade-offs between speed, torque, and precision. Understanding actuators is essential for building robots that can perform physical tasks."
          },
          {
            sectionNumber: 3,
            sectionTitle: "Signal Conditioning and Interfacing",
            content: "Sensor signals are often noisy or at the wrong voltage level. Signal conditioning converts raw sensor outputs into clean, useful signals that a microcontroller or computer can read. In this section, we will learn about operational amplifiers, filters, and analog-to-digital converters (ADCs). We will also discuss communication protocols—I2C, SPI, UART—that are used to interface sensors and actuators with microcontrollers. Interfacing is a practical skill that you will use in every robotics project."
          }
        ]
      },
      {
        moduleNumber: 4,
        moduleTitle: "Control Systems and Programming",
        duration: "4 Hours",
        sections: [
          {
            sectionNumber: 1,
            sectionTitle: "Open-Loop and Closed-Loop Control",
            content: "Control systems govern a robot's behaviour. Open-loop control is simple—it sends commands without feedback—but cannot correct for errors. Closed-loop control uses feedback from sensors to adjust commands dynamically, making the robot more accurate and robust. In this section, we will explore the theory of control systems: transfer functions, block diagrams, and stability analysis. Understanding the difference between open-loop and closed-loop control is fundamental to designing effective robotic systems."
          },
          {
            sectionNumber: 2,
            sectionTitle: "PID Controllers",
            content: "The proportional-integral-derivative (PID) controller is the most widely used control algorithm in robotics and industry. It calculates an error signal as the difference between a desired setpoint and the measured process variable, then applies a correction based on the proportional, integral, and derivative terms. In this section, we will learn how to tune a PID controller using heuristic methods like the Ziegler-Nichols rule. We will implement a PID controller in code and test it on a simulated system. Mastery of PID is a hallmark of a skilled controls engineer."
          },
          {
            sectionNumber: 3,
            sectionTitle: "Robot Programming Paradigms",
            content: "Robots can be programmed using various paradigms: offline programming (creating code without the robot), online programming (teaching by demonstration), and textual programming using languages like C++, Python, or specialized robot languages (URScript, KRL). In this section, we will compare these approaches and discuss the rise of ROS (Robot Operating System), which provides a framework for developing modular robot software. We will also write a simple program to move a robot in a sequence of positions."
          }
        ]
      },
      {
        moduleNumber: 5,
        moduleTitle: "Industrial Automation and Applications",
        duration: "3 Hours",
        sections: [
          {
            sectionNumber: 1,
            sectionTitle: "Manufacturing and Logistics Automation",
            content: "Industrial robots are transforming manufacturing and logistics. In this section, we will explore applications such as welding, painting, assembly, and material handling. We will also discuss automated guided vehicles (AGVs) and the concept of a 'smart factory' where robots communicate with each other and with enterprise systems. Real-world case studies will show how companies are using automation to increase productivity, improve quality, and reduce waste. Industrial automation is a vast field with many opportunities."
          },
          {
            sectionNumber: 2,
            sectionTitle: "Safety and Standards",
            content: "Safety is paramount in robotics. In this section, we will learn about the ISO 10218 standard for industrial robot safety, which covers risk assessment, safeguarding devices (fences, light curtains), and collaborative operation. We will discuss the concept of 'Safety-rated monitored stop' and 'Hand-guided operation' and how they enable human-robot collaboration. Understanding safety requirements is essential for any robot installation—a safe robot is a usable robot."
          },
          {
            sectionNumber: 3,
            sectionTitle: "Case Studies and Emerging Technologies",
            content: "Robotics is evolving rapidly. In this final section, we will examine case studies of successful automation deployments across automotive, electronics, and healthcare industries. We will also look ahead to emerging technologies: soft robotics (using compliant materials), bio-inspired robots, and autonomous mobile robots. The future of robotics is bright, and by staying informed, you can position yourself at the forefront of innovation."
          }
        ]
      }
    ]
  },

    welcomeMessage: "Welcome to Braille Literacy & Tactile Communication Systems. This programme provides comprehensive training in Braille literacy—from the basic alphabet and contractions to advanced writing and reading strategies. You will also explore tactile communication systems more broadly, including the use of assistive technologies and accessible document design. The course is ideal for educators, rehabilitation professionals, and anyone committed to creating inclusive environments for people with visual impairments. Let us begin.",

          {
            sectionNumber: 1,
            sectionTitle: "History and Development of Braille",
            content: "Louis Braille developed the Braille system in the early nineteenth century, inspired by a military code called 'night writing.' The system uses six raised dots arranged in a cell, allowing for sixty-three possible combinations—covering the alphabet, punctuation, and common contractions. In this section, we will trace the history of Braille from its invention to its widespread adoption. Understanding the history of Braille helps us appreciate the profound impact it has had on the lives of blind and visually impaired people, providing them with the freedom of independent reading and writing."

// LESSON PLAYER ENGINE (flp- namespace)
// ============================================================
(function() {
    'use strict';

    // ---- Player State ----
    const PlayerState = {
        courseSlug: null,
        currentModuleIndex: 0,
        currentSectionIndex: 0,
        currentChunkIndex: 0,
        isPlaying: false,
        isPaused: false,
        playbackRate: 1.0,
        volume: 1.0,
        selectedVoice: null,
        progress: 0,
        completedSections: [],
        startTime: null,
        elapsedTime: 0,
        timerInterval: null,
        totalSections: 0,
        textChunks: [],
        isResumeMode: false,
        isSpeaking: false,
        isPausedByUser: false,
        currentUtterance: null
    };

    // ---- DOM References ----
    const overlay = document.getElementById('flp-overlay');
    const courseTitleEl = document.getElementById('flp-course-title');
    const timerEl = document.getElementById('flp-timer');
    const exitBtn = document.getElementById('flp-exit-btn');
    const sidebar = document.getElementById('flp-sidebar');
    const moduleList = document.getElementById('flp-module-list');
    const progressFill = document.getElementById('flp-progress-fill');
    const progressLabel = document.getElementById('flp-progress-label');
    const sectionTitleEl = document.getElementById('flp-section-title');
    const textContentEl = document.getElementById('flp-text-content');
    const readingStatusEl = document.getElementById('flp-reading-status');
    const playBtn = document.getElementById('flp-play-btn');
    const prevSectionBtn = document.getElementById('flp-prev-section');
    const nextSectionBtn = document.getElementById('flp-next-section');
    const rewindBtn = document.getElementById('flp-rewind');
    const forwardBtn = document.getElementById('flp-forward');
    const speedSelect = document.getElementById('flp-speed-select');
    const volumeSlider = document.getElementById('flp-volume-slider');
    const voiceSelect = document.getElementById('flp-voice-select');
    const progressScrub = document.getElementById('flp-progress-scrub');
    const elapsedLabel = document.getElementById('flp-elapsed');
    const remainingLabel = document.getElementById('flp-remaining');
    const textSizeBtn = document.getElementById('flp-text-size-btn');

    let currentCourseData = null;
    let allChunks = [];
    let chunkIndex = 0;
    let isExiting = false;

    // ---- Helper Functions ----
    function formatTime(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function getTotalSections(course) {
        let total = 0;
        course.modules.forEach(m => total += m.sections.length);
        return total;
    }

    function getSectionId(moduleIdx, sectionIdx) {
        return `${moduleIdx}-${sectionIdx}`;
    }

    function isSectionCompleted(moduleIdx, sectionIdx) {
        return PlayerState.completedSections.includes(getSectionId(moduleIdx, sectionIdx));
    }

    function markSectionCompleted(moduleIdx, sectionIdx) {
        const id = getSectionId(moduleIdx, sectionIdx);
        if (!PlayerState.completedSections.includes(id)) {
            PlayerState.completedSections.push(id);
            saveProgress();
            updateSidebar();
        }
    }

    // ---- Split text into chunks for TTS ----
    function chunkText(text) {
        // Split into sentence groups of 3-4 sentences for natural flow
        const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
        const chunks = [];
        for (let i = 0; i < sentences.length; i += 3) {
            chunks.push(sentences.slice(i, i + 3).join(' '));
        }
        return chunks;
    }

    // ---- TTS Engine ----
    const TTSEngine = {
        synth: window.speechSynthesis,
        utterance: null,
        isSpeaking: false,

        speak(text, onEnd, onBoundary) {
            if (!this.synth) return;
            this.cancel();
            this.utterance = new SpeechSynthesisUtterance(text);
            this.utterance.rate = PlayerState.playbackRate;
            this.utterance.pitch = 1.0;
            this.utterance.volume = PlayerState.volume;
            if (PlayerState.selectedVoice) {
                this.utterance.voice = PlayerState.selectedVoice;
            }
            this.utterance.onend = function() {
                if (onEnd) onEnd();
            };
            this.utterance.onboundary = function(e) {
                if (onBoundary && e.name === 'word') {
                    onBoundary(e.charIndex, e.charLength);
                }
            };
            this.isSpeaking = true;
            this.synth.speak(this.utterance);
        },

        pause() {
            if (this.synth && this.isSpeaking) {
                this.synth.pause();
                this.isSpeaking = false;
            }
        },

        resume() {
            if (this.synth && !this.isSpeaking) {
                this.synth.resume();
                this.isSpeaking = true;
            }
        },

        cancel() {
            if (this.synth) {
                this.synth.cancel();
                this.isSpeaking = false;
            }
            this.utterance = null;
        },

        isPaused() {
            return this.synth ? this.synth.paused : false;
        }
    };

    // ---- Load Voice List ----
    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        const enVoices = voices.filter(v => v.lang.startsWith('en'));
        // Priority: en-GB female, en-US female, en-GB male, en-US male, any en
        const priority = ['en-GB', 'en-US'];
        const sorted = enVoices.sort((a, b) => {
            const aPref = priority.indexOf(a.lang.split('-')[0]);
            const bPref = priority.indexOf(b.lang.split('-')[0]);
            if (aPref !== bPref) return aPref - bPref;
            if (a.lang.includes('GB') && !b.lang.includes('GB')) return -1;
            if (b.lang.includes('GB') && !a.lang.includes('GB')) return 1;
            return 0;
        });
        voiceSelect.innerHTML = '<option value="">Default Voice</option>';
        sorted.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.voiceURI;
            opt.textContent = `${v.name} (${v.lang})`;
            voiceSelect.appendChild(opt);
        });
        if (sorted.length > 0) {
            PlayerState.selectedVoice = sorted[0];
            voiceSelect.value = sorted[0].voiceURI;
        }
    }

    // ---- Populate voices after they load ----
    if (window.speechSynthesis) {
        window.speechSynthesis.onvoiceschanged = loadVoices;
        // Also load immediately if already available
        setTimeout(loadVoices, 100);
    }

    // ---- Sidebar Rendering ----
    function renderSidebar(course) {
        const modules = course.modules;
        let html = '';
        modules.forEach((mod, mi) => {
            const isOpen = mi === PlayerState.currentModuleIndex;
            const completedCount = mod.sections.filter((_, si) => isSectionCompleted(mi, si)).length;
            const total = mod.sections.length;
            html += `
                <div class="flp-module ${isOpen ? 'open' : ''}" data-module="${mi}">
                    <div class="flp-module-header" data-module="${mi}">
                        <span>Module ${mod.moduleNumber}: ${mod.moduleTitle}</span>
                        <span class="flp-module-toggle">▾</span>
                    </div>
                    <div class="flp-section-list">
            `;
            mod.sections.forEach((sec, si) => {
                const current = mi === PlayerState.currentModuleIndex && si === PlayerState.currentSectionIndex;
                const completed = isSectionCompleted(mi, si);
                const locked = mi > PlayerState.currentModuleIndex ||
                              (mi === PlayerState.currentModuleIndex && si > PlayerState.currentSectionIndex);
                const cls = `flp-section-item${current ? ' current' : ''}${completed ? ' completed' : ''}${locked ? ' locked' : ''}`;
                html += `
                    <div class="${cls}" data-module="${mi}" data-section="${si}">
                        <span>${sec.sectionNumber}. ${sec.sectionTitle}</span>
                        ${completed ? '<span>✓</span>' : ''}
                    </div>
                `;
            });
            html += `</div></div>`;
        });
        moduleList.innerHTML = html;

        // Update progress
        const total = getTotalSections(course);
        const completed = PlayerState.completedSections.length;
        const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
        progressFill.style.width = pct + '%';
        progressLabel.textContent = pct + '%';

        // Attach events
        document.querySelectorAll('.flp-module-header').forEach(el => {
            el.addEventListener('click', function() {
                const mod = this.parentElement;
                mod.classList.toggle('open');
            });
        });

        document.querySelectorAll('.flp-section-item:not(.locked)').forEach(el => {
            el.addEventListener('click', function() {
                const mi = parseInt(this.dataset.module);
                const si = parseInt(this.dataset.section);
                if (!isSectionCompleted(mi, si) && (mi > PlayerState.currentModuleIndex || (mi === PlayerState.currentModuleIndex && si > PlayerState.currentSectionIndex))) {
                    return; // can't jump to future sections
                }
                jumpToSection(mi, si);
            });
        });
    }

    // ---- Jump to Section ----
    function jumpToSection(moduleIdx, sectionIdx) {
        if (moduleIdx === PlayerState.currentModuleIndex && sectionIdx === PlayerState.currentSectionIndex) return;
        TTSEngine.cancel();
        PlayerState.currentModuleIndex = moduleIdx;
        PlayerState.currentSectionIndex = sectionIdx;
        PlayerState.currentChunkIndex = 0;
        PlayerState.isPlaying = false;
        PlayerState.isPaused = false;
        PlayerState.isPausedByUser = false;
        updatePlayButton();
        renderSection();
        updateSidebar();
        saveProgress();
        // Resume if playback was active
        if (PlayerState.isPlaying) {
            startReading();
        }
    }

    // ---- Render Section Content ----
    function renderSection() {
        const course = currentCourseData;
        if (!course) return;
        const mod = course.modules[PlayerState.currentModuleIndex];
        const sec = mod.sections[PlayerState.currentSectionIndex];
        sectionTitleEl.textContent = `Section ${sec.sectionNumber}: ${sec.sectionTitle}`;
        // Split into chunks if not already
        const text = sec.content;
        const chunks = chunkText(text);
        allChunks = chunks;
        chunkIndex = 0;
        // Show full text initially with no highlight
        textContentEl.innerHTML = text;
        readingStatusEl.textContent = `Reading: Section ${sec.sectionNumber} of ${mod.sections.length} — Module ${PlayerState.currentModuleIndex + 1} of ${course.modules.length}`;
        // Update progress scrub
        const total = getTotalSections(course);
        const completed = PlayerState.completedSections.length;
        const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
        progressScrub.value = pct;
        updateSidebar();
    }

    // ---- Highlight word ----
    function highlightWord(charIndex, charLength) {
        const text = textContentEl.textContent;
        if (charIndex >= 0 && charIndex < text.length) {
            const before = text.substring(0, charIndex);
            const highlighted = text.substring(charIndex, charIndex + charLength);
            const after = text.substring(charIndex + charLength);
            textContentEl.innerHTML = `${before}<span class="flp-highlight">${highlighted}</span>${after}`;
            // Auto-scroll to keep highlighted word in view
            const highlightEl = textContentEl.querySelector('.flp-highlight');
            if (highlightEl) {
                highlightEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
        }
    }

    // ---- Start Reading ----
    function startReading() {
        if (!currentCourseData) return;
        if (PlayerState.isSpeaking) return;

        const course = currentCourseData;
        const mod = course.modules[PlayerState.currentModuleIndex];
        const sec = mod.sections[PlayerState.currentSectionIndex];

        if (chunkIndex === 0) {
            // Announce section title
            const announce = `Section ${sec.sectionNumber}: ${sec.sectionTitle}`;
            TTSEngine.speak(announce, function() {
                // Then read content chunks
                readNextChunk();
            }, null);
        } else {
            readNextChunk();
        }
    }

    function readNextChunk() {
        if (chunkIndex >= allChunks.length) {
            // Section complete
            const course = currentCourseData;
            const mod = course.modules[PlayerState.currentModuleIndex];
            const sec = mod.sections[PlayerState.currentSectionIndex];
            markSectionCompleted(PlayerState.currentModuleIndex, PlayerState.currentSectionIndex);
            // Move to next section
            const nextSectionIndex = PlayerState.currentSectionIndex + 1;
            if (nextSectionIndex < mod.sections.length) {
                PlayerState.currentSectionIndex = nextSectionIndex;
                PlayerState.currentChunkIndex = 0;
                renderSection();
                updateSidebar();
                saveProgress();
                // Announce next section
                const nextSec = mod.sections[nextSectionIndex];
                const announce = `Section ${nextSec.sectionNumber}: ${nextSec.sectionTitle}`;
                TTSEngine.speak(announce, function() {
                    allChunks = chunkText(nextSec.content);
                    chunkIndex = 0;
                    readNextChunk();
                }, null);
            } else {
                // Next module
                const nextModuleIndex = PlayerState.currentModuleIndex + 1;
                if (nextModuleIndex < course.modules.length) {
                    PlayerState.currentModuleIndex = nextModuleIndex;
                    PlayerState.currentSectionIndex = 0;
                    PlayerState.currentChunkIndex = 0;
                    renderSection();
                    updateSidebar();
                    saveProgress();
                    // Announce module and first section
                    const newMod = course.modules[nextModuleIndex];
                    const firstSec = newMod.sections[0];
                    const announce = `Module ${newMod.moduleNumber}: ${newMod.moduleTitle}. Section ${firstSec.sectionNumber}: ${firstSec.sectionTitle}`;
                    TTSEngine.speak(announce, function() {
                        allChunks = chunkText(firstSec.content);
                        chunkIndex = 0;
                        readNextChunk();
                    }, null);
                } else {
                    // Course complete!
                    TTSEngine.speak(`Congratulations. You have completed ${course.courseTitle}. We hope this programme has equipped you with valuable knowledge and skills. Please proceed to take your assessment.`, function() {
                        PlayerState.isPlaying = false;
                        updatePlayButton();
                        // Mark course as complete in localStorage
                        const key = `foranova_completed_${PlayerState.courseSlug}`;
                        localStorage.setItem(key, 'true');
                    }, null);
                }
            }
            return;
        }

        const chunk = allChunks[chunkIndex];
        TTSEngine.speak(chunk, function() {
            chunkIndex++;
            readNextChunk();
        }, function(charIndex, charLength) {
            highlightWord(charIndex, charLength);
        });
        PlayerState.isPlaying = true;
        updatePlayButton();
    }

    // ---- Pause / Resume ----
    function togglePlayPause() {
        if (!currentCourseData) return;
        if (PlayerState.isPausedByUser) {
            // Resume
            PlayerState.isPausedByUser = false;
            if (TTSEngine.isPaused()) {
                TTSEngine.resume();
            } else {
                // If not paused but stopped, restart
                startReading();
            }
            PlayerState.isPlaying = true;
            updatePlayButton();
            return;
        }

        if (PlayerState.isPlaying) {
            // Pause
            TTSEngine.pause();
            PlayerState.isPausedByUser = true;
            PlayerState.isPlaying = false;
            updatePlayButton();
        } else {
            // Start
            PlayerState.isPausedByUser = false;
            if (allChunks.length === 0 || chunkIndex >= allChunks.length) {
                // Reset and start from current section
                const course = currentCourseData;
                const mod = course.modules[PlayerState.currentModuleIndex];
                const sec = mod.sections[PlayerState.currentSectionIndex];
                allChunks = chunkText(sec.content);
                chunkIndex = 0;
            }
            startReading();
            PlayerState.isPlaying = true;
            updatePlayButton();
        }
    }

    // ---- Update Play Button ----
    function updatePlayButton() {
        if (PlayerState.isPlaying && !PlayerState.isPausedByUser) {
            playBtn.innerHTML = '⏸';
            playBtn.setAttribute('aria-label', 'Pause');
        } else {
            playBtn.innerHTML = '▶';
            playBtn.setAttribute('aria-label', 'Play');
        }
    }

    // ---- Previous / Next Section ----
    function goToPrevSection() {
        const course = currentCourseData;
        if (!course) return;
        let mi = PlayerState.currentModuleIndex;
        let si = PlayerState.currentSectionIndex - 1;
        if (si < 0) {
            mi--;
            if (mi < 0) return;
            si = course.modules[mi].sections.length - 1;
        }
        // Only allow if section is completed or current
        if (isSectionCompleted(mi, si) || (mi === PlayerState.currentModuleIndex && si === PlayerState.currentSectionIndex - 1)) {
            jumpToSection(mi, si);
        }
    }

    function goToNextSection() {
        const course = currentCourseData;
        if (!course) return;
        let mi = PlayerState.currentModuleIndex;
        let si = PlayerState.currentSectionIndex + 1;
        if (si >= course.modules[mi].sections.length) {
            mi++;
            if (mi >= course.modules.length) return;
            si = 0;
        }
        jumpToSection(mi, si);
    }

    // ---- Update Sidebar ----
    function updateSidebar() {
        if (currentCourseData) {
            renderSidebar(currentCourseData);
        }
    }

    // ---- Save Progress ----
    function saveProgress() {
        if (!PlayerState.courseSlug) return;
        const key = `foranova_progress_${PlayerState.courseSlug}`;
        const data = {
            moduleIndex: PlayerState.currentModuleIndex,
            sectionIndex: PlayerState.currentSectionIndex,
            completedSections: PlayerState.completedSections,
            elapsedTime: PlayerState.elapsedTime,
            lastAccessed: new Date().toISOString()
        };
        localStorage.setItem(key, JSON.stringify(data));
    }

    // ---- Load Progress ----
    function loadProgress(slug) {
        const key = `foranova_progress_${slug}`;
        const saved = localStorage.getItem(key);
        if (saved) {
            try {
                return JSON.parse(saved);
            } catch(_) { return null; }
        }
        return null;
    }

    // ---- Resume Dialog ----
    function showResumeDialog(callback) {
        const dialog = document.createElement('div');
        dialog.style.cssText = `
            position: fixed; inset: 0; z-index: 3000;
            background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        `;
        const box = document.createElement('div');
        box.style.cssText = `
            background: #1b1f29; padding: 32px; border-radius: 16px;
            max-width: 440px; width: 90%; text-align: center;
            border: 1px solid rgba(0,224,255,0.2);
            box-shadow: 0 12px 48px rgba(0,0,0,0.6);
        `;
        box.innerHTML = `
            <h2 style="color: var(--primary-color); font-size: 1.4em; margin-bottom: 8px;">Welcome Back</h2>
            <p style="color: rgba(255,255,255,0.7);">You left off at Module ${PlayerState.currentModuleIndex + 1}, Section ${PlayerState.currentSectionIndex + 1}. Would you like to continue from where you stopped, or start from the beginning?</p>
            <div style="display: flex; gap: 12px; margin-top: 20px; justify-content: center; flex-wrap: wrap;">
                <button class="btn btn-primary" id="resume-continue">Continue</button>
                <button class="btn btn-outline" id="resume-startover">Start Over</button>
            </div>
        `;
        dialog.appendChild(box);
        document.body.appendChild(dialog);

        dialog.querySelector('#resume-continue').addEventListener('click', function() {
            document.body.removeChild(dialog);
            callback('continue');
        });
        dialog.querySelector('#resume-startover').addEventListener('click', function() {
            document.body.removeChild(dialog);
            callback('startover');
        });
    }

    // ---- Open Player ----
    function openPlayer(slug) {
        if (!FORANOVA_COURSE_CONTENT[slug]) {
            console.error('Course not found:', slug);
            return;
        }

        // Hide Nyvona
        const chatToggle = document.getElementById('chatToggle');
        if (chatToggle) chatToggle.style.display = 'none';

        currentCourseData = FORANOVA_COURSE_CONTENT[slug];
        PlayerState.courseSlug = slug;
        courseTitleEl.textContent = currentCourseData.courseTitle;

        // Check for saved progress
        const saved = loadProgress(slug);
        if (saved && saved.completedSections && saved.completedSections.length > 0) {
            PlayerState.completedSections = saved.completedSections;
            PlayerState.currentModuleIndex = saved.moduleIndex || 0;
            PlayerState.currentSectionIndex = saved.sectionIndex || 0;
            PlayerState.elapsedTime = saved.elapsedTime || 0;
            // Show resume dialog
            showResumeDialog(function(choice) {
                if (choice === 'startover') {
                    PlayerState.completedSections = [];
                    PlayerState.currentModuleIndex = 0;
                    PlayerState.currentSectionIndex = 0;
                    PlayerState.elapsedTime = 0;
                    // Also clear completed flag
                    localStorage.removeItem(`foranova_completed_${slug}`);
                    initPlayer();
                } else {
                    initPlayer();
                }
            });
        } else {
            // Fresh start
            PlayerState.completedSections = [];
            PlayerState.currentModuleIndex = 0;
            PlayerState.currentSectionIndex = 0;
            PlayerState.elapsedTime = 0;
            initPlayer();
        }

        overlay.classList.add('active');
        // Push history
        history.pushState({ player: true, slug: slug }, '', `#learn/${slug}`);
        isExiting = false;
    }

    // ---- Init Player ----
    function initPlayer() {
        const course = currentCourseData;
        if (!course) return;
        PlayerState.totalSections = getTotalSections(course);
        renderSidebar(course);
        renderSection();
        // Check if course is already completed
        const completedKey = `foranova_completed_${PlayerState.courseSlug}`;
        if (localStorage.getItem(completedKey) === 'true') {
            // Mark all sections complete
            course.modules.forEach((mod, mi) => {
                mod.sections.forEach((_, si) => {
                    markSectionCompleted(mi, si);
                });
            });
            updateSidebar();
        }
        // Start timer
        if (!PlayerState.startTime) {
            PlayerState.startTime = Date.now();
        }
        PlayerState.timerInterval = setInterval(function() {
            if (PlayerState.startTime) {
                PlayerState.elapsedTime += 1;
                timerEl.textContent = formatTime(PlayerState.elapsedTime);
                elapsedLabel.textContent = formatTime(PlayerState.elapsedTime);
                // Update remaining (rough estimate)
                const total = getTotalSections(course);
                const completed = PlayerState.completedSections.length;
                const remaining = total - completed;
                const avgTimePerSection = PlayerState.elapsedTime / (completed || 1);
                const remainingSeconds = remaining * avgTimePerSection;
                remainingLabel.textContent = formatTime(remainingSeconds);
                saveProgress();
            }
        }, 1000);

        // Show initial timer
        timerEl.textContent = formatTime(PlayerState.elapsedTime);
        elapsedLabel.textContent = formatTime(PlayerState.elapsedTime);
        // Play automatically if no user interaction yet
        if (!PlayerState.isPlaying && !PlayerState.isPausedByUser) {
            setTimeout(function() {
                togglePlayPause();
            }, 500);
        }
    }

    // ---- Close Player ----
    function closePlayer() {
        if (isExiting) return;
        isExiting = true;
        TTSEngine.cancel();
        if (PlayerState.timerInterval) {
            clearInterval(PlayerState.timerInterval);
            PlayerState.timerInterval = null;
        }
        saveProgress();
        overlay.classList.remove('active');
        // Show Nyvona
        const chatToggle = document.getElementById('chatToggle');
        if (chatToggle) chatToggle.style.display = 'flex';
        // Restore history
        history.back();
        // Reset state for next open
        PlayerState.isPlaying = false;
        PlayerState.isPausedByUser = false;
        updatePlayButton();
        isExiting = false;
    }

    // ---- Exit confirmation ----
    function confirmExit() {
        if (confirm('Are you sure you want to exit the lesson? Your progress will be saved.')) {
            closePlayer();
        }
    }

    // ---- Rewind / Forward ----
    function rewind() {
        if (chunkIndex > 0) {
            chunkIndex--;
            TTSEngine.cancel();
            readNextChunk();
        } else {
            // Restart current section
            const course = currentCourseData;
            const mod = course.modules[PlayerState.currentModuleIndex];
            const sec = mod.sections[PlayerState.currentSectionIndex];
            allChunks = chunkText(sec.content);
            chunkIndex = 0;
            TTSEngine.cancel();
            readNextChunk();
        }
    }

    function forward() {
        if (chunkIndex < allChunks.length - 1) {
            chunkIndex++;
            TTSEngine.cancel();
            readNextChunk();
        }
    }

    // ---- Aa Text Size Toggle ----
    let textSizeLevel = 0; // 0=small, 1=medium, 2=large
    const textSizes = ['0.5em', '0.7em', '0.9em', '1.0em', '1.2em', '1.4em',  '1.6em',  '1.8em', '2.0em', '2.2em', '2.4em', '2.6em'];
    textSizeBtn.addEventListener('click', function() {
        textSizeLevel = (textSizeLevel + 1) % 12;
        textContentEl.style.fontSize = textSizes[textSizeLevel];
        this.classList.toggle('active', textSizeLevel === 1);
    });

    // ---- Event Listeners ----
    exitBtn.addEventListener('click', confirmExit);

    playBtn.addEventListener('click', togglePlayPause);

    prevSectionBtn.addEventListener('click', goToPrevSection);
    nextSectionBtn.addEventListener('click', goToNextSection);

    rewindBtn.addEventListener('click', rewind);
    forwardBtn.addEventListener('click', forward);

    speedSelect.addEventListener('change', function() {
        PlayerState.playbackRate = parseFloat(this.value);
        if (TTSEngine.utterance) {
            TTSEngine.utterance.rate = PlayerState.playbackRate;
        }
    });

    volumeSlider.addEventListener('input', function() {
        PlayerState.volume = parseFloat(this.value);
        if (TTSEngine.utterance) {
            TTSEngine.utterance.volume = PlayerState.volume;
        }
    });

    voiceSelect.addEventListener('change', function() {
        const voices = window.speechSynthesis.getVoices();
        const selected = voices.find(v => v.voiceURI === this.value);
        if (selected) {
            PlayerState.selectedVoice = selected;
            if (TTSEngine.utterance) {
                TTSEngine.utterance.voice = selected;
            }
        }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (!overlay.classList.contains('active')) return;
        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            togglePlayPause();
        }
        if (e.key === 'ArrowRight') {
            e.preventDefault();
            forward();
        }
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            rewind();
        }
        if (e.key === 'Escape') {
            e.preventDefault();
            confirmExit();
        }
    });

    // ---- Back button support ----
    window.addEventListener('popstate', function(e) {
        if (overlay.classList.contains('active') && !e.state?.player) {
            closePlayer();
        }
    });

    // ---- Add "Start Learning" buttons to course detail pages ----
    function addStartLearningButtons() {
        const container = document.getElementById('courseDetailContainer');
        if (!container) return;
        const heroActions = container.querySelector('.hero-actions');
        if (heroActions && !heroActions.querySelector('.flp-start-learning')) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-primary flp-start-learning';
            btn.innerHTML = '<i class="fas fa-play"></i> Start Learning';
            btn.style.marginRight = '8px';
            const slug = window.currentCourseSlug || container.dataset.slug;
            if (slug) {
                btn.dataset.slug = slug;
                btn.addEventListener('click', function() {
                    const s = this.dataset.slug;
                    if (s) {
                        // Check if course is completed
                        const key = `foranova_completed_${s}`;
                        if (localStorage.getItem(key) === 'true') {
                            if (confirm('You have already completed this course. Would you like to review it again?')) {
                                openPlayer(s);
                            }
                        } else {
                            openPlayer(s);
                        }
                    }
                });
                heroActions.prepend(btn);
            }
        }
    }

    // ---- Override renderCourse to add slug and button ----
    const originalRenderCourse = window.renderCourse;
    if (typeof originalRenderCourse === 'function') {
        window.renderCourse = function(slug) {
            originalRenderCourse(slug);
            // Store slug in container
            const container = document.getElementById('courseDetailContainer');
            if (container) {
                container.dataset.slug = slug;
                window.currentCourseSlug = slug;
            }
            // Check completion status and update button
            const key = `foranova_completed_${slug}`;
            const isCompleted = localStorage.getItem(key) === 'true';
            setTimeout(function() {
                const btn = document.querySelector('.flp-start-learning');
                if (btn) {
                    if (isCompleted) {
                        btn.innerHTML = '<i class="fas fa-check-circle"></i> Review Course';
                        btn.style.background = '#4caf50';
                    } else {
                        btn.innerHTML = '<i class="fas fa-play"></i> Start Learning';
                        btn.style.background = '';
                    }
                }
            }, 100);
        };
        // Patch renderCourse to call addStartLearningButtons after rendering
        const originalRenderCourseInner = window.renderCourse;
        window.renderCourse = function(slug) {
            originalRenderCourseInner(slug);
            setTimeout(addStartLearningButtons, 50);
        };
    }

    // ---- Also add to initial course detail rendering ----
    // Observe DOM for course detail container changes
    const courseObserver = new MutationObserver(function() {
        const container = document.getElementById('courseDetailContainer');
        if (container && container.children.length > 0) {
            addStartLearningButtons();
        }
    });
    const targetNode = document.getElementById('courseDetailContainer');
    if (targetNode) {
        courseObserver.observe(targetNode, { childList: true, subtree: true });
    }

    // ---- Expose openPlayer globally for router ----
    window.openPlayer = openPlayer;

    // ---- Handle #learn/:slug route ----
    const originalNavigate = window.navigate;
    if (typeof originalNavigate === 'function') {
        window.navigate = function(hash) {
            const parts = hash.replace('#', '').split('/');
            const view = parts[0] || 'home';
            const slug = parts[1] || null;
            if (view === 'learn' && slug && FORANOVA_COURSE_CONTENT[slug]) {
                // Open player directly
                openPlayer(slug);
                return;
            }
            // If player is open, close it
            if (overlay.classList.contains('active')) {
                closePlayer();
            }
            originalNavigate(hash);
        };
    }

    // ---- Clean up on page unload ----
    window.addEventListener('beforeunload', function() {
        if (TTSEngine) TTSEngine.cancel();
    });

})();
    </script>

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      console.log("Firebase connected successfully");

    // ============================================================
    // SEED COURSES COLLECTION ON FIRST RUN
    // ============================================================
    async function seedCourses() {
      const snapshot = await db.collection('courses').limit(1).get();
      if (snapshot.empty) {
        const batch = db.batch();
        COURSES.forEach(c => {
          const ref = db.collection('courses').doc(c.slug);
          batch.set(ref, c);
        });
        await batch.commit();
        console.log('Courses seeded.');
      }
    }

    // ============================================================
    // AUTH GATE LOGIC
    // ============================================================
    const authGate = document.getElementById('auth-gate');
    const dashboard = document.getElementById('dashboard');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const forgotForm = document.getElementById('forgot-form');

    function showLogin() { loginForm.style.display = 'block'; signupForm.style.display = 'none'; forgotForm.style.display = 'none'; }
    function showSignup() { loginForm.style.display = 'none'; signupForm.style.display = 'block'; forgotForm.style.display = 'none'; }
    function showForgot() { loginForm.style.display = 'none'; signupForm.style.display = 'none'; forgotForm.style.display = 'block'; }

    document.getElementById('show-signup').addEventListener('click', showSignup);
    document.getElementById('show-login').addEventListener('click', showLogin);
    document.getElementById('show-forgot').addEventListener('click', showForgot);
    document.getElementById('show-login-from-reset').addEventListener('click', showLogin);

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-password').value;
      try {
        await auth.signInWithEmailAndPassword(email, pass);
      } catch (e) { alert(e.message); }
    });

    document.getElementById('signup-btn').addEventListener('click', async () => {
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const pass = document.getElementById('signup-password').value;
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await db.collection('learners').doc(cred.user.uid).set({
          fullName: name,
          email: email,
          clearanceLevel: 3,
          unlockedCourses: [],
          disabled: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } catch (e) { alert(e.message); }
    });

    document.getElementById('reset-btn').addEventListener('click', async () => {
      const email = document.getElementById('reset-email').value;
      try {
        await auth.sendPasswordResetEmail(email);
        alert('Reset link sent to your email.');
      } catch (e) { alert(e.message); }
    });

    // Force clearance for seeded admins
    const SEEDED_CLEARANCE = {
      'fofem2@gmail.com': 1,
      'eveeubi@gmail.com': 2
    };

    // ============================================================
    // AUTH STATE OBSERVER
    // ============================================================
    let currentUser = null;
    let currentLearnerProfile = null;
    let allCourses = [];

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        authGate.style.display = 'none';
        dashboard.classList.add('active');
        // Force sync clearance for seeded emails
        const forcedLevel = SEEDED_CLEARANCE[user.email];
        if (forcedLevel) {
          await db.collection('learners').doc(user.uid).update({ clearanceLevel: forcedLevel });
        }
        // Load learner profile
        const doc = await db.collection('learners').doc(user.uid).get();
        if (!doc.exists) {
          // fallback: create minimal profile
          await db.collection('learners').doc(user.uid).set({
            fullName: user.displayName || 'Learner',
            email: user.email,
            clearanceLevel: 3,
            unlockedCourses: [],
            disabled: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          currentLearnerProfile = { fullName: user.displayName || 'Learner', email: user.email, clearanceLevel: 3, unlockedCourses: [] };
        } else {
          currentLearnerProfile = doc.data();
          if (currentLearnerProfile.disabled) {
            alert('This account has been disabled. Please contact ForraNova Academy.');
            auth.signOut();
            return;
          }
        }
        // Load all courses from Firestore
        const coursesSnap = await db.collection('courses').get();
        if (coursesSnap.empty) {
          await seedCourses();
          // reload
          const newSnap = await db.collection('courses').get();
          allCourses = newSnap.docs.map(d => d.data());
        } else {
          allCourses = coursesSnap.docs.map(d => d.data());
        }
        // Render dashboard
        renderDashboard();
        // Start listening for real-time updates on learner profile
        db.collection('learners').doc(user.uid).onSnapshot((doc) => {
          if (doc.exists) {
            currentLearnerProfile = doc.data();
            renderDashboard();
          }
        });
      } else {
        // Not logged in
        authGate.style.display = 'block';
        dashboard.classList.remove('active');
        currentUser = null;
        currentLearnerProfile = null;
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      auth.signOut();
    });

    // ============================================================
    // DASHBOARD RENDER
    // ============================================================
    function renderDashboard() {
      if (!currentLearnerProfile) return;
      const unlocked = currentLearnerProfile.unlockedCourses || [];
      const certifiedSlugs = getCertifiedSlugs(); // read from localStorage or Firestore later
      const myCourses = allCourses.filter(c => unlocked.includes(c.slug));
      const available = allCourses.filter(c => !unlocked.includes(c.slug));

      const myGrid = document.getElementById('my-courses');
      myGrid.innerHTML = myCourses.map(c => {
        const certified = certifiedSlugs.includes(c.slug);
        return `
          <div class="course-card">
            <h3>${c.title}</h3>
            <p>${c.tagline}</p>
            ${certified ? '<span class="ribbon">Certified ✓</span>' : ''}
            <div style="margin-top:1rem;">
              <button class="btn btn-primary btn-sm" data-slug="${c.slug}" data-action="start">${certified ? 'Review Course' : 'Start Learning'}</button>
              ${certified ? `<button class="btn btn-outline btn-sm" data-slug="${c.slug}" data-action="cert">Download Certificate</button>` : ''}
              <button class="btn btn-ghost btn-sm" data-slug="${c.slug}" data-action="delete"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        `;
      }).join('');

      const availGrid = document.getElementById('available-courses');
      availGrid.innerHTML = available.map(c => {
        const isFree = c.accessType === 'free';
        const isPaid = c.accessType === 'paid';
        const canEnrolFree = isFree && canEnrolFreeCourse();
        const canRequestPaid = isPaid;
        return `
          <div class="course-card">
            <h3>${c.title}</h3>
            <p>${c.tagline}</p>
            <div class="badge-pill">${isFree ? 'free' : 'paid'}</div>
            ${isFree ? `<button class="btn btn-primary btn-sm" data-slug="${c.slug}" data-action="enrol-free" ${!canEnrolFree ? 'disabled' : ''}>Enrol for free</button>` : ''}
            ${isPaid ? `<button class="btn btn-primary btn-sm" data-slug="${c.slug}" data-action="request-paid">Request Access — ${c.price || 'Contact Us'}</button>` : ''}
          </div>
        `;
      }).join('');

      // attach events
      document.querySelectorAll('#my-courses .btn[data-action="start"]').forEach(btn => {
        btn.addEventListener('click', () => openPlayer(btn.dataset.slug));
      });
      document.querySelectorAll('#my-courses .btn[data-action="cert"]').forEach(btn => {
        btn.addEventListener('click', () => generateCertificate(btn.dataset.slug));
      });
      document.querySelectorAll('#my-courses .btn[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', () => deleteCourse(btn.dataset.slug));
      });
      document.querySelectorAll('#available-courses .btn[data-action="enrol-free"]').forEach(btn => {
        btn.addEventListener('click', () => enrolFree(btn.dataset.slug));
      });
      document.querySelectorAll('#available-courses .btn[data-action="request-paid"]').forEach(btn => {
        btn.addEventListener('click', () => requestPaid(btn.dataset.slug));
      });
    }

    // ============================================================
    // FREE COURSE CAP (Level 3 only)
    // ============================================================
    function getCertifiedSlugs() {
      // read from localStorage or Firestore; for now use localStorage
      const stored = localStorage.getItem('foranova_certified');
      return stored ? JSON.parse(stored) : [];
    }

    function countActiveFreeCourses() {
      const unlocked = currentLearnerProfile.unlockedCourses || [];
      const certified = getCertifiedSlugs();
      return unlocked.filter(slug => {
        const course = allCourses.find(c => c.slug === slug);
        return course && course.accessType === 'free' && !certified.includes(slug);
      }).length;
    }

    function canEnrolFreeCourse() {
      if (currentLearnerProfile.clearanceLevel <= 2) return true; // admins/handlers exempt
      return countActiveFreeCourses() < 2;
    }

    async function enrolFree(slug) {
      if (!canEnrolFreeCourse()) {
        alert('You currently have 2 active free courses in progress. Complete and certify at least one to unlock another free enrolment.');
        return;
      }
      await db.collection('learners').doc(currentUser.uid).update({
        unlockedCourses: firebase.firestore.FieldValue.arrayUnion(slug)
      });
    }

    async function deleteCourse(slug) {
      const course = allCourses.find(c => c.slug === slug);
      if (!course) return;
      const msg = `Are you sure you want to delete "${course.title}" from your dashboard?`;
      if (!confirm(msg)) return;
      if (course.accessType === 'free') {
        // remove from unlockedCourses
        await db.collection('learners').doc(currentUser.uid).update({
          unlockedCourses: firebase.firestore.FieldValue.arrayRemove(slug)
        });
      } else {
        // paid: archive locally (store in localStorage)
        const archived = JSON.parse(localStorage.getItem('foranova_archived') || '[]');
        if (!archived.includes(slug)) {
          archived.push(slug);
          localStorage.setItem('foranova_archived', JSON.stringify(archived));
        }
        alert('This course has been archived. You can still access it from your dashboard later.');
        renderDashboard();
      }
    }

    // ============================================================
    // PAID COURSE REQUEST
    // ============================================================
    async function requestPaid(slug) {
      const course = allCourses.find(c => c.slug === slug);
      if (!course) return;
      // Show modal with payment instructions
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center;';
      modal.innerHTML = `
        <div style="background:#1b1f29; padding:2rem; border-radius:16px; max-width:500px; width:90%;">
          <h3 style="color:var(--primary-color);">Request Access: ${course.title}</h3>
          <p><strong>Price:</strong> ${course.price || 'Contact us'}</p>
          <p>Payment instructions: <em>// TODO: Ethan – insert bank details</em></p>
          <button id="email-proof" class="btn btn-primary">I Have Sent My Payment Proof</button>
          <button id="close-modal" class="btn btn-ghost">Cancel</button>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('close-modal').addEventListener('click', () => modal.remove());
      document.getElementById('email-proof').addEventListener('click', async () => {
        // create pending request
        await db.collection('accessRequests').add({
          uid: currentUser.uid,
          learnerEmail: currentUser.email,
          courseSlug: slug,
          courseTitle: course.title,
          status: 'pending',
          requestedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('Your request has been submitted. Verification typically takes 1–10 working days. You will be notified when approved.');
        modal.remove();
      });
    }

    // ============================================================
    // LESSON PLAYER INTEGRATION (reuse from index)
    // ============================================================
    // Copy the entire lesson player code from index.html (the second IIFE)
    // We'll reference the openPlayer function here.
    // For brevity, assume we've copied the full flp- code from index.
    // Ensure it uses FORANOVA_COURSE_CONTENT and the same overlay.
    // We'll include a placeholder – you can paste the exact code.
    function openPlayer(slug) {
      // This is the same function from index.
      // It should use FORANOVA_COURSE_CONTENT and overlay.
    }

    // ============================================================
    // EXAM ENGINE
    // ============================================================
    let examQuestions = [];
    let examAnswers = [];
    let currentExamIndex = 0;
    let examTimer = 60 * 60;
    let examInterval = null;
    let examInProgress = false;

    async function startExam(slug) {
      // fetch questions from Firestore or use local pool
      const qSnap = await db.collection('examQuestions').doc(slug).get();
      let pool = [];
      if (qSnap.exists) {
        pool = qSnap.data().bank || [];
      } else {
        // fallback: generate from course content (not ideal but possible)
        pool = generateQuestionsFromContent(slug);
      }
      // shuffle and pick 50
      const shuffled = shuffleArray(pool);
      const selected = shuffled.slice(0, 50);
      examQuestions = selected.map((q, i) => ({ ...q, index: i }));
      examAnswers = new Array(50).fill(null);

      // show exam overlay
      const overlay = document.getElementById('exam-overlay');
      overlay.classList.add('active');
      document.getElementById('exam-course-title').textContent = `Exam: ${allCourses.find(c=>c.slug===slug).title}`;
      examInProgress = true;
      currentExamIndex = 0;
      renderQuestion();

      // timer
      examTimer = 60 * 60;
      document.getElementById('exam-timer').textContent = formatTime(examTimer);
      examInterval = setInterval(() => {
        examTimer--;
        document.getElementById('exam-timer').textContent = formatTime(examTimer);
        if (examTimer <= 300) document.getElementById('exam-timer').style.color = '#ff5252';
        if (examTimer <= 0) {
          clearInterval(examInterval);
          submitExam(true); // auto-submit
        }
      }, 1000);

      // fullscreen
      document.documentElement.requestFullscreen().catch(() => {});

      // forfeit listeners
      document.addEventListener('visibilitychange', handleForfeit);
      window.addEventListener('blur', handleForfeit);
    }

    function renderQuestion() {
      const q = examQuestions[currentExamIndex];
      const container = document.getElementById('exam-question-container');
      container.innerHTML = `
        <div class="flp-exam-question">${q.question}</div>
        <div class="flp-exam-options">
          ${q.options.map((opt, idx) => `
            <div class="flp-exam-option" data-index="${idx}" data-selected="${examAnswers[currentExamIndex] === idx ? 'true' : 'false'}">
              ${opt}
            </div>
          `).join('')}
        </div>
      `;
      // highlight selected
      container.querySelectorAll('.flp-exam-option').forEach(el => {
        const idx = parseInt(el.dataset.index);
        if (examAnswers[currentExamIndex] === idx) el.classList.add('selected');
        el.addEventListener('click', () => {
          // store answer
          examAnswers[currentExamIndex] = idx;
          renderQuestion(); // re-render to update selection
          // auto-advance if not last
          if (currentExamIndex < examQuestions.length - 1) {
            setTimeout(() => goToQuestion(currentExamIndex + 1), 200);
          } else {
            // show submit button
            document.getElementById('exam-submit').style.display = 'block';
          }
        });
      });
      // navigation buttons
      document.getElementById('exam-prev').style.display = currentExamIndex > 0 ? 'inline-block' : 'none';
      document.getElementById('exam-next').style.display = currentExamIndex < examQuestions.length - 1 && examAnswers[currentExamIndex+1] !== undefined ? 'inline-block' : 'none';
      document.getElementById('exam-submit').style.display = (currentExamIndex === examQuestions.length - 1) ? 'inline-block' : 'none';

      // update progress
      document.getElementById('exam-next').addEventListener('click', () => goToQuestion(currentExamIndex + 1));
      document.getElementById('exam-prev').addEventListener('click', () => goToQuestion(currentExamIndex - 1));
      document.getElementById('exam-submit').addEventListener('click', () => submitExam(false));
    }

    function goToQuestion(idx) {
      if (idx < 0 || idx >= examQuestions.length) return;
      currentExamIndex = idx;
      renderQuestion();
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function handleForfeit() {
      if (examInProgress && (document.hidden || document.visibilityState === 'hidden')) {
        forfeitExam();
      }
    }

    function forfeitExam() {
      examInProgress = false;
      clearInterval(examInterval);
      document.exitFullscreen();
      document.removeEventListener('visibilitychange', handleForfeit);
      window.removeEventListener('blur', handleForfeit);
      document.getElementById('exam-overlay').classList.remove('active');
      alert('Your exam was forfeited because you left the screen. Please start a fresh attempt when you are ready to focus.');
    }

    async function submitExam(auto) {
      if (!auto) {
        const unanswered = examAnswers.filter(a => a === null).length;
        if (unanswered > 0) {
          if (!confirm(`You have ${unanswered} unanswered questions. Submit anyway?`)) return;
        }
      }
      examInProgress = false;
      clearInterval(examInterval);
      document.exitFullscreen();
      document.removeEventListener('visibilitychange', handleForfeit);
      window.removeEventListener('blur', handleForfeit);
      // grade
      let correct = 0;
      const details = [];
      examQuestions.forEach((q, idx) => {
        const userAns = examAnswers[idx];
        const isCorrect = userAns === q.correctOptionIndex;
        if (isCorrect) correct++;
        details.push({
          question: q.question,
          userAnswer: userAns !== null ? q.options[userAns] : 'Not answered',
          correctAnswer: q.options[q.correctOptionIndex],
          isCorrect
        });
      });
      const score = Math.round((correct / examQuestions.length) * 100);
      const passed = score >= 70;

      // show results
      const resultsOverlay = document.getElementById('results-overlay');
      resultsOverlay.style.display = 'flex';
      document.getElementById('exam-overlay').classList.remove('active');
      document.getElementById('results-score').textContent = `Score: ${score}% - ${passed ? 'PASSED' : 'FAILED'}`;
      // render details
      const detailDiv = document.getElementById('results-detail');
      detailDiv.innerHTML = details.map((d, i) => `
        <div style="margin:1rem 0; padding:1rem; border-radius:8px; background:${d.isCorrect ? 'rgba(76,175,80,0.1)' : 'rgba(255,82,82,0.1)'};">
          <p><strong>Q${i+1}:</strong> ${d.question}</p>
          ${d.isCorrect ? `<p style="color:#4caf50;">✅ Correct: ${d.correctAnswer}</p>` : `
            <p style="color:#ff5252;">❌ Your answer: ${d.userAnswer}</p>
            <p style="color:#4caf50;">Correct answer: ${d.correctAnswer}</p>
          `}
        </div>
      `).join('');

      document.getElementById('results-certificate-btn').style.display = passed ? 'inline-block' : 'none';
      document.getElementById('results-retry-btn').style.display = 'inline-block';
      document.getElementById('results-review-btn').style.display = 'inline-block';

      if (passed) {
        // store certificate
        await generateAndStoreCertificate(score);
        document.getElementById('results-certificate-btn').addEventListener('click', () => generateCertificatePDF(slug));
      }

      document.getElementById('results-retry-btn').addEventListener('click', () => {
        resultsOverlay.style.display = 'none';
        startExam(slug);
      });
      document.getElementById('results-review-btn').addEventListener('click', () => {
        resultsOverlay.style.display = 'none';
        openPlayer(slug);
      });
    }

    async function generateAndStoreCertificate(score) {
      const course = allCourses.find(c => c.slug === currentExamSlug);
      const learner = currentLearnerProfile;
      const code = `SN-${new Date().toISOString().slice(0,7).replace('-','')}-${Math.floor(1000+Math.random()*9000)}/${course.slug.substring(0,2).toUpperCase()}`;
      const learnerCode = `FA-${learner.fullName.split(' ').map(n=>n[0]).join('')}-${new Date().getFullYear()}/${course.slug.substring(0,2).toUpperCase()}`;
      const certData = {
        verificationCode: code,
        learnerName: learner.fullName,
        learnerCode: learnerCode,
        courseTitle: course.title,
        enrolmentDate: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' }),
        completionDate: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' }),
        deliveryMode: course.format || 'Online',
        duration: course.duration,
        levelAwarded: course.level,
        passingScore: score + '%'
      };
      // save to Firestore
      await db.collection('certificates').doc(code).set(certData);
      // mark as certified in localStorage
      const certified = getCertifiedSlugs();
      if (!certified.includes(course.slug)) {
        certified.push(course.slug);
        localStorage.setItem('foranova_certified', JSON.stringify(certified));
      }
      // also save to learner's own collection for easier retrieval
      await db.collection('learners').doc(currentUser.uid).collection('certificates').doc(code).set(certData);
    }

    // ============================================================
    // CERTIFICATE GENERATION (PDF)
    // ============================================================
    async function generateCertificatePDF(slug) {
      // fetch cert data from Firestore
      const certs = await db.collection('learners').doc(currentUser.uid).collection('certificates')
        .where('courseTitle', '==', allCourses.find(c => c.slug === slug).title)
        .get();
      if (certs.empty) { alert('No certificate found.'); return; }
      const certData = certs.docs[0].data();
      // populate template
      document.getElementById('cert-learner-name').innerText = certData.learnerName;
      document.getElementById('cert-course-line').innerText =
        `has successfully demonstrated advanced mastery and proficiency in ${certData.courseTitle.toUpperCase()}`;
      document.getElementById('cert-level').innerText = certData.levelAwarded.toUpperCase();
      document.getElementById('cert-issued').innerText = certData.completionDate;
      document.getElementById('cert-verify').innerText = certData.verificationCode;

      const node = document.getElementById('certificate-template');
      node.style.display = 'block';
      const canvas = await html2canvas(node, { scale: 2, useCORS: true });
      const imgData = canvas.toDataURL('image/png');
      const pdf = new jspdf.jsPDF({ orientation: 'landscape', unit: 'px', format: [1146, 804] });
      pdf.addImage(imgData, 'PNG', 0, 0, 1146, 804);
      pdf.save(`ForraNova-Certificate-${certData.learnerCode}.pdf`);
      node.style.display = 'none';
    }

    // ============================================================
    // INIT
    // ============================================================
    // Ensure the lesson player code (from index) is also included.
    // For brevity, we assume it's pasted here.
    // We'll also attach exam start to "Start Learning" if course not certified?
    // The dashboard will handle that.

    console.log('learn.html loaded.');
  </script>
