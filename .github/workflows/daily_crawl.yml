name: ForraCorp Job Crawler
on:
  schedule:
    - cron: '0 0 * * *' # Midnight daily
  workflow_dispatch:      # Manual trigger button

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Python Setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Tools
        run: |
          pip install playwright
          playwright install chromium

      - name: Execute Search
        run: python crawler.py

      - name: Update Repository
        run: |
          git config --global user.name 'ForraCorp-Bot'
          git config --global user.email 'bot@forracorp.com'
          git add jobs.json
          git commit -m "Automated ML Job Update" || exit 0
          git push
