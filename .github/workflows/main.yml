name: Scheduled Intelligence Gathering

on:
  schedule:
    # This is "Cron" syntax for every 3 hours starting at Midnight
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright schedule
          playwright install chromium

      - name: Run Crawler
        run: python crawler_script.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "ForraCorp-Sentinel-Bot"
          git config --global user.email "bot@forracorp.com"
          git add last_run.json
          git commit -m "Automated Intelligence Update: $(date)" || echo "No changes to commit"
          git push
