<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForraNova | Web AI Teacher Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="header-top">
                <h1>ForraNova</h1>
                <h2>🎓 Web AI Teacher Pro.</h2>
                <div id="status-dot"></div>
            </div>
            <p id="status-text">Waking up the brain...</p>
            <progress id="load-progress" value="0" max="100" style="display:none;"></progress>
        </header>

        <div id="chat-history"></div>

        <div class="controls-bar">
            <label><input type="checkbox" id="voice-toggle" checked> Speak</label>
            <button id="clear-notes">🗑️ Clear Notebook</button>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask a question...">
            <button id="mic-btn">🎤</button>
            <button id="send-btn">Send</button>
        </div>

        <div id="notebook-section">
            <h3>📒 Saved Lessons</h3>
            <div id="notes-list"></div>
        </div>
        <p id="status-text">Waking up the brain... <button onclick="forceReset()" style="font-size: 8px;">Reset</button></p>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
